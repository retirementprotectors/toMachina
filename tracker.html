<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>toMachina UI Tracker</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
  :root {
    --bg: #0f1219;
    --bg-card: #161b26;
    --bg-surface: #1c2333;
    --bg-hover: #232b3e;
    --border: #2a3347;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --portal: #4a7ab5;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --teal: #14b8a6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 50; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header h1 span { color: var(--portal); }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .stats { display: flex; gap: 12px; padding: 16px 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .stat { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .stat:hover { border-color: var(--border); }
  .stat.active { border-color: var(--portal); background: rgba(74,122,181,0.1); }
  .stat .count { font-size: 15px; font-weight: 700; }
  .stat-all .count { color: var(--text); }
  .stat-not_touched .count { color: var(--red); }
  .stat-in_progress .count { color: var(--amber); }
  .stat-done .count { color: var(--teal); }
  .stat-confirmed .count { color: var(--green); }
  .stat-deferred .count { color: var(--purple); }

  .filters { display: flex; gap: 8px; padding: 12px 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-right: 4px; }
  select, .search-input { height: 32px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text); padding: 0 10px; font-size: 13px; outline: none; }
  select:focus, .search-input:focus { border-color: var(--portal); }
  .search-input { width: 220px; }

  .btn { height: 32px; padding: 0 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .btn:hover { border-color: var(--portal); color: var(--text); }
  .btn-primary { background: var(--portal); border-color: var(--portal); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn .material-icons-outlined { font-size: 16px; }

  .content { padding: 0 32px 32px; }

  .group { margin-top: 20px; }
  .group-header { display: flex; align-items: center; gap: 10px; padding: 10px 0; cursor: pointer; user-select: none; }
  .group-header h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--portal); }
  .group-header .group-count { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .group-header .material-icons-outlined { font-size: 18px; color: var(--text-muted); transition: transform 0.2s; }
  .group-header.collapsed .material-icons-outlined { transform: rotate(-90deg); }

  .item { display: grid; grid-template-columns: 40px 100px 1fr 140px 180px; gap: 0; align-items: stretch; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: var(--bg-card); transition: all 0.15s; overflow: hidden; }
  .item:hover { border-color: rgba(74,122,181,0.4); }
  .item.status-confirmed { border-left: 3px solid var(--green); }
  .item.status-done { border-left: 3px solid var(--teal); }
  .item.status-in_progress { border-left: 3px solid var(--amber); }
  .item.status-not_touched { border-left: 3px solid var(--red); }
  .item.status-deferred { border-left: 3px solid var(--purple); }

  .item-id { padding: 10px 8px; font-size: 10px; font-weight: 700; font-family: monospace; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
  .item-section-badge { padding: 10px 8px; display: flex; align-items: center; justify-content: center; }
  .item-section-badge span { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: var(--bg-surface); color: var(--text-muted); white-space: nowrap; }

  .item-body { padding: 10px 12px; min-width: 0; }
  .item-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .item-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .item-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .item-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(74,122,181,0.1); color: var(--portal); font-weight: 500; }

  .item-status { padding: 10px 8px; display: flex; align-items: center; justify-content: center; }
  .status-select { height: 28px; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 0 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text); cursor: pointer; width: 120px; }

  .item-notes { padding: 10px 8px; display: flex; align-items: center; }
  .notes-input { width: 100%; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); padding: 0 8px; font-size: 11px; outline: none; }
  .notes-input:focus { border-color: var(--portal); }
  .notes-input::placeholder { color: var(--text-muted); }

  .hidden { display: none !important; }

  .add-item-form { display: none; padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--bg-card); }
  .add-item-form.show { display: block; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 150px; }
  .form-row textarea { height: 60px; padding: 8px 10px; resize: vertical; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
  .form-row textarea:focus { border-color: var(--portal); }

  .export-info { font-size: 11px; color: var(--text-muted); }

  @media (max-width: 900px) {
    .item { grid-template-columns: 1fr; }
    .header { padding: 16px; }
    .content { padding: 0 16px 16px; }
    .stats, .filters { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>toMachina</span> UI Tracker</h1>
    <div class="export-info" id="lastSaved"></div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="toggleAddForm()"><span class="material-icons-outlined">add</span> Add Item</button>
    <button class="btn" onclick="exportJSON()"><span class="material-icons-outlined">download</span> Export</button>
    <button class="btn" onclick="importJSON()"><span class="material-icons-outlined">upload</span> Import</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <span class="filter-label">Portal</span>
  <select id="filterPortal" onchange="renderItems()">
    <option value="all">All Portals</option>
    <option value="PRODASHX">ProDashX</option>
    <option value="SHARED">Shared (All Portals)</option>
    <option value="RIIMO">RIIMO</option>
    <option value="SENTINEL">SENTINEL</option>
    <option value="INFRA">Infrastructure</option>
    <option value="DATA">Data</option>
  </select>
  <span class="filter-label">Scope</span>
  <select id="filterScope" onchange="renderItems()">
    <option value="all">All Scopes</option>
    <option value="Module">Module (Portal-Branded)</option>
    <option value="App">App (Own Brand)</option>
    <option value="Platform">Platform / Global</option>
    <option value="Data">Data / Firestore</option>
  </select>
  <span class="filter-label">Component</span>
  <select id="filterComponent" onchange="renderItems()"></select>
  <input type="text" class="search-input" id="searchInput" placeholder="Search items..." oninput="renderItems()">
</div>

<div class="add-item-form" id="addForm">
  <div class="form-row">
    <input type="text" id="newTitle" placeholder="Title" class="search-input" style="width:auto;flex:2">
    <select id="newPortal" style="width:auto">
      <option value="PRODASHX">ProDashX</option>
      <option value="SHARED">Shared</option>
      <option value="RIIMO">RIIMO</option>
      <option value="SENTINEL">SENTINEL</option>
      <option value="INFRA">Infrastructure</option>
      <option value="DATA">Data</option>
    </select>
    <select id="newScope" style="width:auto">
      <option value="Module">Module</option>
      <option value="App">App</option>
      <option value="Platform">Platform</option>
      <option value="Data">Data</option>
    </select>
    <input type="text" id="newComponent" placeholder="Component" class="search-input" style="width:auto">
    <input type="text" id="newSection" placeholder="Section" class="search-input" style="width:auto;flex:0.5">
  </div>
  <div class="form-row">
    <textarea id="newDesc" placeholder="Description"></textarea>
  </div>
  <div class="form-row">
    <button class="btn btn-primary" onclick="addNewItem()">Add Item</button>
    <button class="btn" onclick="toggleAddForm()">Cancel</button>
  </div>
</div>

<div class="content" id="content"></div>

<script>

  not_touched: 'Not Touched',

  done: 'Done',
  confirmed: 'Confirmed by JDM',
  deferred: 'Deferred',
  wont_fix: "Won't Fix"
};

const STATUS_COLORS = {
  not_touched: 'var(--red)',
  in_progress: 'var(--amber)',
  done: 'var(--teal)',
  confirmed: 'var(--green)',
  deferred: 'var(--purple)',
  wont_fix: 'var(--text-muted)'
};

let activeStatusFilter = 'all';

// ─── INITIAL DATA ───

  { id:'ACC-002', title:'+ New button opens new Account', desc:'+ New button must open new ACCOUNT creation, not contact intake. Currently links to /intake which creates contacts. Need account creation flow.', portal:'PRODASHX', scope:'Module', component:'Accounts Grid', section:'Header', status:'not_touched', sprint:'9', notes:'No account creation page exists yet' },

  { id:'ACC-006', title:'Carrier filter shows all carriers', desc:'Carrier dropdown now populated from ALL accounts, not just first 500.', portal:'PRODASHX', scope:'Module', component:'Accounts Grid', section:'Filters', status:'done', sprint:'9', notes:'Consequence of ACC-003' },
  { id:'ACC-007', title:'Filter section spacing — consolidate rows', desc:'Three rows of filters takes too much vertical space. Needs consolidation into fewer rows.', portal:'PRODASHX', scope:'Module', component:'Accounts Grid', section:'Filters', status:'not_touched', sprint:'9', notes:'' },

  { id:'ACC-009', title:'Cursor pointer on rows', desc:'Rows show pointer cursor on hover to indicate clickability.', portal:'PRODASHX', scope:'Module', component:'Accounts Grid', section:'Body', status:'done', sprint:'8', notes:'Was already done' },

// ─── STATE ───
let items = [];

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { items = JSON.parse(saved); } catch { items = [...DEFAULT_ITEMS]; }
  } else {
    items = [...DEFAULT_ITEMS];
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  document.getElementById('lastSaved').textContent = 'Saved ' + new Date().toLocaleTimeString();
}

// ─── RENDER ───
function getStatusCounts() {
  const counts = { all: items.length, not_touched: 0, in_progress: 0, done: 0, confirmed: 0, deferred: 0, wont_fix: 0 };
  items.forEach(i => { if (counts[i.status] !== undefined) counts[i.status]++; });
  return counts;
}

function renderStats() {
  const counts = getStatusCounts();
  const el = document.getElementById('stats');
  el.innerHTML = Object.entries(counts).map(([key, count]) => {
    const label = key === 'all' ? 'Total' : (STATUS_LABELS[key] || key);
    const active = activeStatusFilter === key ? ' active' : '';
    return `<div class="stat stat-${key}${active}" onclick="filterByStatus('${key}')"><span class="count">${count}</span> ${label}</div>`;
  }).join('');
}

function filterByStatus(status) {
  activeStatusFilter = status;
  renderStats();
  renderItems();
}

function getFilteredItems() {
  const portal = document.getElementById('filterPortal').value;
  const scope = document.getElementById('filterScope').value;
  const component = document.getElementById('filterComponent').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  return items.filter(i => {
    if (activeStatusFilter !== 'all' && i.status !== activeStatusFilter) return false;
    if (portal !== 'all' && i.portal !== portal) return false;
    if (scope !== 'all' && i.scope !== scope) return false;
    if (component !== 'all' && i.component !== component) return false;
    if (search && !i.title.toLowerCase().includes(search) && !i.desc.toLowerCase().includes(search) && !i.id.toLowerCase().includes(search)) return false;
    return true;
  });
}

function populateComponentFilter() {
  const sel = document.getElementById('filterComponent');
  const components = [...new Set(items.map(i => i.component))].sort();
  sel.innerHTML = '<option value="all">All Components</option>' + components.map(c => `<option value="${c}">${c}</option>`).join('');
}

function renderItems() {
  const filtered = getFilteredItems();
  const groups = {};
  filtered.forEach(i => {
    const key = `${i.portal} > ${i.component}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });

  const el = document.getElementById('content');
  if (filtered.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted)">No items match your filters.</div>';
    return;
  }

  let html = '';
  for (const [groupKey, groupItems] of Object.entries(groups)) {
    html += `<div class="group">`;
    html += `<div class="group-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('hidden')">`;
    html += `<span class="material-icons-outlined">expand_more</span>`;
    html += `<h2>${groupKey}</h2>`;
    html += `<span class="group-count">${groupItems.length} items</span>`;
    html += `</div>`;
    html += `<div class="group-items">`;
    for (const item of groupItems) {
      html += `<div class="item status-${item.status}">`;
      html += `<div class="item-id">${item.id}</div>`;
      html += `<div class="item-section-badge"><span>${item.section}</span></div>`;
      html += `<div class="item-body">`;
      html += `<div class="item-title">${item.title}</div>`;
      html += `<div class="item-desc">${item.desc}</div>`;
      html += `<div class="item-tags">`;
      html += `<span class="item-tag">${item.scope}</span>`;
      html += `<span class="item-tag">Sprint ${item.sprint}</span>`;
      html += `</div></div>`;
      html += `<div class="item-status"><select class="status-select" onchange="updateStatus('${item.id}',this.value)" style="color:${STATUS_COLORS[item.status] || 'var(--text)'}">`;
      for (const [sk, sl] of Object.entries(STATUS_LABELS)) {
        html += `<option value="${sk}" ${item.status === sk ? 'selected' : ''}>${sl}</option>`;
      }
      html += `</select></div>`;
      html += `<div class="item-notes"><input class="notes-input" placeholder="Notes..." value="${(item.notes||'').replace(/"/g,'&quot;')}" onchange="updateNotes('${item.id}',this.value)"></div>`;
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

function updateStatus(id, status) {
  const item = items.find(i => i.id === id);
  if (item) { item.status = status; item.dateUpdated = new Date().toISOString(); saveState(); renderStats(); renderItems(); }
}

function updateNotes(id, notes) {
  const item = items.find(i => i.id === id);
  if (item) { item.notes = notes; saveState(); }
}

// ─── ADD ITEM ───
function toggleAddForm() {
  document.getElementById('addForm').classList.toggle('show');
}

function addNewItem() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) return;
  const maxNum = Math.max(0, ...items.map(i => parseInt(i.id.split('-')[1]) || 0));
  const newItem = {
    id: `NEW-${String(maxNum + 1).padStart(3, '0')}`,
    title,
    desc: document.getElementById('newDesc').value.trim(),
    portal: document.getElementById('newPortal').value,
    scope: document.getElementById('newScope').value,
    component: document.getElementById('newComponent').value.trim() || 'Unassigned',
    section: document.getElementById('newSection').value.trim() || 'Body',
    status: 'not_touched',
    sprint: '9',
    notes: '',
    dateAdded: new Date().toISOString()
  };
  items.push(newItem);
  saveState();
  toggleAddForm();
  document.getElementById('newTitle').value = '';
  document.getElementById('newDesc').value = '';
  document.getElementById('newComponent').value = '';
  document.getElementById('newSection').value = '';
  populateComponentFilter();
  renderStats();
  renderItems();
}

// ─── EXPORT / IMPORT ───
function exportJSON() {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tomachina-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        items = JSON.parse(ev.target.result);
        saveState();
        populateComponentFilter();
        renderStats();
        renderItems();
      } catch { /* ignore bad file */ }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─── INIT ───
loadState();
populateComponentFilter();
renderStats();
renderItems();
</script>
