        - generic [ref=e223]:
          - text: When using
          - link "Claude Code on the web" [ref=e224] [cursor=pointer]:
            - /url: /docs/en/claude-code-on-the-web
          - text: ", additional security controls are in place:"
        - list [ref=e225]:
          - listitem [ref=e226]:
            - strong [ref=e227]: Isolated virtual machines
            - text: ": Each cloud session runs in an isolated, Anthropic-managed VM"
          - listitem [ref=e228]:
            - strong [ref=e229]: Network access controls
            - text: ": Network access is limited by default and can be configured to be disabled or allow only specific domains"
          - listitem [ref=e230]:
            - strong [ref=e231]: Credential protection
            - text: ": Authentication is handled through a secure proxy that uses a scoped credential inside the sandbox, which is then translated to your actual GitHub authentication token"
          - listitem [ref=e232]:
            - strong [ref=e233]: Branch restrictions
            - text: ": Git push operations are restricted to the current working branch"
          - listitem [ref=e234]:
            - strong [ref=e235]: Audit logging
            - text: ": All operations in cloud environments are logged for compliance and audit purposes"
          - listitem [ref=e236]:
            - strong [ref=e237]: Automatic cleanup
            - text: ": Cloud environments are automatically terminated after session completion"
        - generic [ref=e238]:
          - text: For more details on cloud execution, see
          - link "Claude Code on the web" [ref=e239] [cursor=pointer]:
            - /url: /docs/en/claude-code-on-the-web
          - text: .
        - generic [ref=e240]:
          - link "Remote Control" [ref=e241] [cursor=pointer]:
            - /url: /docs/en/remote-control
          - text: "sessions work differently: the web interface connects to a Claude Code process running on your local machine. All code execution and file access stays local, and the same data that flows during any local Claude Code session travels through the Anthropic API over TLS. No cloud VMs or sandboxing are involved. The connection uses multiple short-lived, narrowly scoped credentials, each limited to a specific purpose and expiring independently, to limit the blast radius of any single compromised credential."
