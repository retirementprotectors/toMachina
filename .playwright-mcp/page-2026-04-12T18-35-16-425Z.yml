          - text: ":"
        - list [ref=e188]:
          - listitem [ref=e189]: Review suggested commands before approval
          - listitem [ref=e190]: Avoid piping untrusted content directly to Claude
          - listitem [ref=e191]: Verify proposed changes to critical files
