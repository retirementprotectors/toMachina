          - generic [ref=e157] [cursor=pointer]: Additional safeguards
        - list [ref=e158]:
          - listitem [ref=e159]:
            - strong [ref=e160]: Network request approval
            - text: ": Tools that make network requests require user approval by default"
          - listitem [ref=e161]:
            - strong [ref=e162]: Isolated context windows
            - text: ": Web fetch uses a separate context window to avoid injecting potentially malicious prompts"
          - listitem [ref=e163]:
            - strong [ref=e164]: Trust verification
            - text: ": First-time codebase runs and new MCP servers require trust verification"
            - list [ref=e165]:
              - listitem [ref=e166]:
                - text: "Note: Trust verification is disabled when running non-interactively with the"
                - code [ref=e167]: "-p"
                - text: flag
          - listitem [ref=e168]:
            - strong [ref=e169]: Command injection detection
            - text: ": Suspicious bash commands require manual approval even if previously allowlisted"
          - listitem [ref=e170]:
            - strong [ref=e171]: Fail-closed matching
            - text: ": Unmatched commands default to requiring manual approval"
          - listitem [ref=e172]:
            - strong [ref=e173]: Natural language descriptions
            - text: ": Complex bash commands include explanations for user understanding"
          - listitem [ref=e174]:
