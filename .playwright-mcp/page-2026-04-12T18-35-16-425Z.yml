        - generic [ref=e73]:
          - text: Your code’s security is paramount. Claude Code is built with security at its core, developed according to Anthropic’s comprehensive security program. Learn more and access resources (SOC 2 Type 2 report, ISO 27001 certificate, etc.) at
          - link "Anthropic Trust Center" [ref=e74] [cursor=pointer]:
            - /url: https://trust.anthropic.com
          - text: .
        - heading "Navigate to header Permission-based architecture" [level=3] [ref=e75]:
          - link "Navigate to header" [ref=e76] [cursor=pointer]:
            - /url: "#permission-based-architecture"
            - img [ref=e78]
          - generic [ref=e80] [cursor=pointer]: Permission-based architecture
        - generic [ref=e81]: Claude Code uses strict read-only permissions by default. When additional actions are needed (editing files, running tests, executing commands), Claude Code requests explicit permission. Users control whether to approve actions once or allow them automatically.
        - generic [ref=e82]: We designed Claude Code to be transparent and secure. For example, we require approval for bash commands before executing them, giving you direct control. This approach enables users and organizations to configure permissions directly.
        - generic [ref=e83]:
          - text: For detailed permission configuration, see
          - link "Permissions" [ref=e84] [cursor=pointer]:
            - /url: /docs/en/permissions
          - text: .
        - heading "Navigate to header Built-in protections" [level=3] [ref=e85]:
          - link "Navigate to header" [ref=e86] [cursor=pointer]:
            - /url: "#built-in-protections"
            - img [ref=e88]
          - generic [ref=e90] [cursor=pointer]: Built-in protections
        - generic [ref=e91]: "To mitigate risks in agentic systems:"
        - list [ref=e92]:
          - listitem [ref=e93]:
            - strong [ref=e94]: Sandboxed bash tool
            - text: ":"
            - link "Sandbox" [ref=e95] [cursor=pointer]:
              - /url: /docs/en/sandboxing
            - text: bash commands with filesystem and network isolation, reducing permission prompts while maintaining security. Enable with
            - code [ref=e96]: /sandbox
            - text: to define boundaries where Claude Code can work autonomously
          - listitem [ref=e97]:
            - strong [ref=e98]: Write access restriction
            - text: ": Claude Code can only write to the folder where it was started and its subfolders—it cannot modify files in parent directories without explicit permission. While Claude Code can read files outside the working directory (useful for accessing system libraries and dependencies), write operations are strictly confined to the project scope, creating a clear security boundary"
          - listitem [ref=e99]:
            - strong [ref=e100]: Prompt fatigue mitigation
            - text: ": Support for allowlisting frequently used safe commands per-user, per-codebase, or per-organization"
          - listitem [ref=e101]:
            - strong [ref=e102]: Accept Edits mode
            - text: ": Batch accept multiple edits while maintaining permission prompts for commands with side effects"
        - heading "Navigate to header User responsibility" [level=3] [ref=e103]:
          - link "Navigate to header" [ref=e104] [cursor=pointer]:
            - /url: "#user-responsibility"
            - img [ref=e106]
          - generic [ref=e108] [cursor=pointer]: User responsibility
        - generic [ref=e109]: Claude Code only has the permissions you grant it. You’re responsible for reviewing proposed code and commands for safety before approval.
        - heading "Navigate to header Protect against prompt injection" [level=2] [ref=e110]:
          - link "Navigate to header" [ref=e111] [cursor=pointer]:
            - /url: "#protect-against-prompt-injection"
            - img [ref=e113]
          - generic [ref=e115] [cursor=pointer]: Protect against prompt injection
        - generic [ref=e116]: "Prompt injection is a technique where an attacker attempts to override or manipulate an AI assistant’s instructions by inserting malicious text. Claude Code includes several safeguards against these attacks:"
        - heading "Navigate to header Core protections" [level=3] [ref=e117]:
          - link "Navigate to header" [ref=e118] [cursor=pointer]:
            - /url: "#core-protections"
            - img [ref=e120]
          - generic [ref=e122] [cursor=pointer]: Core protections
        - list [ref=e123]:
          - listitem [ref=e124]:
            - strong [ref=e125]: Permission system
            - text: ": Sensitive operations require explicit approval"
          - listitem [ref=e126]:
            - strong [ref=e127]: Context-aware analysis
            - text: ": Detects potentially harmful instructions by analyzing the full request"
          - listitem [ref=e128]:
            - strong [ref=e129]: Input sanitization
            - text: ": Prevents command injection by processing user inputs"
          - listitem [ref=e130]:
            - strong [ref=e131]: Command blocklist
            - text: ": Blocks risky commands that fetch arbitrary content from the web like"
            - code [ref=e132]: curl
            - text: and
            - code [ref=e133]: wget
            - text: by default. When explicitly allowed, be aware of
            - link "permission pattern limitations" [ref=e134] [cursor=pointer]:
              - /url: /docs/en/permissions#tool-specific-permission-rules
        - heading "Navigate to header Privacy safeguards" [level=3] [ref=e135]:
