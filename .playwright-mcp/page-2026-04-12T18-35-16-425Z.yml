        - generic [ref=e177]:
          - img "Warning" [ref=e179]
          - generic [ref=e182]:
            - strong [ref=e183]: Windows WebDAV security risk
            - text: ": When running Claude Code on Windows, we recommend against enabling WebDAV or allowing Claude Code to access paths such as"
            - code [ref=e184]: \\*
            - text: that may contain WebDAV subdirectories.
            - link "WebDAV has been deprecated by Microsoft" [ref=e185] [cursor=pointer]:
              - /url: https://learn.microsoft.com/en-us/windows/whats-new/deprecated-features#:~:text=The%20Webclient%20(WebDAV)%20service%20is%20deprecated
            - text: due to security risks. Enabling WebDAV may allow Claude Code to trigger network requests to remote hosts, bypassing the permission system.
        - generic [ref=e186]:
