# Deploy only API + Bridge services to Cloud Run
# Usage: gcloud builds submit --config=cloudbuild-api-bridge.yaml .

steps:
  # Build + push API container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:latest',
      '-f', 'services/api/Dockerfile',
      '.'
    ]
    id: 'docker-api'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:latest']
    id: 'push-api'
    waitFor: ['docker-api']

  # Build + push Bridge container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:latest',
      '-f', 'services/bridge/Dockerfile',
      '.'
    ]
    id: 'docker-bridge'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:latest']
    id: 'push-bridge'
    waitFor: ['docker-bridge']

  # Deploy API to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-api',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:latest',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '1Gi',
      '--cpu', '2',
      '--min-instances', '1',
      '--max-instances', '20',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-api'
    waitFor: ['push-api']

  # Deploy Bridge to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-bridge',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:latest',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '5',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-bridge'
    waitFor: ['push-bridge']

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:latest'

options:
  logging: CLOUD_LOGGING_ONLY
