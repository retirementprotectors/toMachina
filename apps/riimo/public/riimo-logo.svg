<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 80" fill="none">
  <defs>
    <linearGradient id="rim-ring" x1="4" y1="58" x2="58" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a4d35"/>
      <stop offset="1" stop-color="#3da06e"/>
    </linearGradient>
    <filter id="rim-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Subtle center glow -->
  <circle cx="32" cy="36" r="8" fill="#3da06e" opacity="0.1" filter="url(#rim-glow)"/>

  <!-- Mark: Compass / operational crosshair -->
  <circle cx="32" cy="36" r="24" stroke="url(#rim-ring)" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="36" r="6.5" fill="url(#rim-ring)"/>

  <!-- Cardinal lines (N, S, E, W) -->
  <line x1="32" y1="6" x2="32" y2="18" stroke="url(#rim-ring)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="66" stroke="url(#rim-ring)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="36" x2="14" y2="36" stroke="url(#rim-ring)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="36" x2="62" y2="36" stroke="url(#rim-ring)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Diagonal ticks (NE, NW, SE, SW) -->
  <line x1="49" y1="19" x2="54" y2="14" stroke="url(#rim-ring)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="15" y1="19" x2="10" y2="14" stroke="url(#rim-ring)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="49" y1="53" x2="54" y2="58" stroke="url(#rim-ring)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="15" y1="53" x2="10" y2="58" stroke="url(#rim-ring)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Wordmark -->
  <text x="70" y="45" font-family="'Inter',system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="30" font-weight="700" fill="#f0f0f5" letter-spacing="2">
    RIIMO
  </text>

  <!-- Tagline -->
  <text x="72" y="64" font-family="'Inter',system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="11" fill="#55556a" letter-spacing="2.5">
    <tspan font-weight="300" font-style="italic">by </tspan><tspan font-weight="500">toMachina</tspan>
  </text>
</svg>
