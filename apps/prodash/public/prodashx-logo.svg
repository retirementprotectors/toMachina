<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 175" fill="none">
  <defs>
    <linearGradient id="pdx-blue" x1="0" y1="110" x2="260" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a3158"/>
      <stop offset="1" stop-color="#4a7ab5"/>
    </linearGradient>
  </defs>

  <!-- ============ GAUGE CLUSTER ============ -->
  <g transform="translate(8, 0)">

    <!-- Gauge 1 (largest, leftmost) -->
    <path d="M 15 112 A 90 90 0 0 1 50 22 L 78 110 Z" fill="url(#pdx-blue)" opacity="0.78"/>
    <path d="M 12 115 A 93 93 0 0 1 158 15" stroke="#5a6577" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="78" y1="110" x2="50" y2="22" stroke="#5a6577" stroke-width="3" stroke-linecap="round"/>

    <!-- Gauge 2 (middle) -->
    <path d="M 82 112 A 74 74 0 0 1 112 28 L 138 108 Z" fill="url(#pdx-blue)" opacity="0.84"/>
    <path d="M 78 115 A 78 78 0 0 1 204 22" stroke="#5a6577" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="138" y1="108" x2="112" y2="28" stroke="#5a6577" stroke-width="3" stroke-linecap="round"/>

    <!-- Gauge 3 (smallest, rightmost) -->
    <path d="M 140 108 A 60 60 0 0 1 166 38 L 188 104 Z" fill="url(#pdx-blue)" opacity="0.9"/>
    <path d="M 137 112 A 64 64 0 0 1 242 30" stroke="#5a6577" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="188" y1="104" x2="166" y2="38" stroke="#5a6577" stroke-width="3" stroke-linecap="round"/>

  </g>

  <!-- ============ WORDMARK ============ -->
  <text x="140" y="150" text-anchor="middle"
        font-family="'Georgia','Times New Roman','Palatino Linotype',serif">
    <tspan fill="#355375" font-size="42" font-weight="400">P</tspan><tspan fill="#355375" font-size="35" font-weight="400" letter-spacing="0.5">RO</tspan><tspan fill="#4a7ab5" font-size="35" font-weight="400" letter-spacing="0.5">DASH</tspan><tspan fill="#7ba8d4" font-size="40" font-weight="700">X</tspan>
  </text>

  <!-- ============ TAGLINE ============ -->
  <text x="140" y="170" text-anchor="middle"
        font-family="'Inter',system-ui,-apple-system,sans-serif"
        font-size="10" fill="#55556a" letter-spacing="2.5">
    <tspan font-weight="300" font-style="italic">by </tspan><tspan font-weight="500">toMachina</tspan>
  </text>
</svg>
