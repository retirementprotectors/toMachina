name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run type-check
      - run: npx turbo run build

  e2e-ui:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCUAn7VioaNJAzhtjUQCtd-7byd6ISR_7A
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: claude-mcp-484718.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: claude-mcp-484718
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: claude-mcp-484718.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '365181509090'
      NEXT_PUBLIC_FIREBASE_APP_ID: '1:365181509090:web:08aea23422c813d23b6dbb'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test --project=setup --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  deploy-api:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: claude-mcp-484718
      REGION: us-central1
      REGISTRY: us-central1-docker.pkg.dev/claude-mcp-484718/tomachina
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/365181509090/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@claude-mcp-484718.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to Artifact Registry
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build + push API image
      - run: |
          docker build -t ${{ env.REGISTRY }}/tm-api:latest -f services/api/Dockerfile .
          docker push ${{ env.REGISTRY }}/tm-api:latest

      # Build + push Bridge image
      - run: |
          docker build -t ${{ env.REGISTRY }}/tm-bridge:latest -f services/bridge/Dockerfile .
          docker push ${{ env.REGISTRY }}/tm-bridge:latest

      # Deploy API to Cloud Run (with liveness probe — auto-restarts on Firestore stale connections)
      - run: |
          gcloud run deploy tm-api \
            --image ${{ env.REGISTRY }}/tm-api:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 20 \
            --port 8080 \
            --no-allow-unauthenticated \
            --liveness-probe httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,periodSeconds=30,failureThreshold=3,timeoutSeconds=10 \
            --project ${{ env.PROJECT_ID }}

      # Deploy Bridge to Cloud Run (with liveness probe)
      - run: |
          gcloud run deploy tm-bridge \
            --image ${{ env.REGISTRY }}/tm-bridge:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --port 8080 \
            --no-allow-unauthenticated \
            --liveness-probe httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,periodSeconds=30,failureThreshold=3,timeoutSeconds=10 \
            --project ${{ env.PROJECT_ID }}

      # Smoke test — verify API responds after deploy
      - name: Smoke test API health
        run: |
          API_URL=$(gcloud run services describe tm-api --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
          TOKEN=$(gcloud auth print-identity-token --impersonate-service-account=github-deployer@claude-mcp-484718.iam.gserviceaccount.com --audiences="$API_URL" --include-email)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$API_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::API health check failed with status $STATUS"
            curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/health"
            exit 1
          fi
          echo "API health check passed (HTTP $STATUS)"
          curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/health" | jq .

  e2e-intake:
    needs: deploy-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      # Authenticate with GCP for Firestore + Drive access
      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/365181509090/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@claude-mcp-484718.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2

      # Get Cloud Run API URL for test target
      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe tm-api --region us-central1 --project claude-mcp-484718 --format 'value(status.url)')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      # Run backend E2E pipeline tests
      - name: Run E2E intake tests
        env:
          TEST_API_URL: ${{ steps.api-url.outputs.url }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        run: npm run test:e2e

      # Upload test report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-intake-report
          path: tests/e2e/
          retention-days: 14
