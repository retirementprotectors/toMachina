name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check if only docs changed
        id: filter
        run: |
          # Compare against merge-base for PRs, or previous commit for pushes
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          echo "Changed files:"
          echo "$CHANGED"
          # docs_only = true when every changed file matches docs patterns
          # (html, md, jpg/jpeg/png/svg/webp under docs/, or files under docs/)
          if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qvE '^(docs/|.*\.(md|html)$|docs/.*\.(jpg|jpeg|png|svg|webp|gif|css)$)'; then
            echo "docs_only=false" >> $GITHUB_OUTPUT
          else
            echo "docs_only=true" >> $GITHUB_OUTPUT
          fi

  check:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Docs-only short-circuit
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only PR — skipping type-check + build. ✅"
      - uses: actions/checkout@v5
        if: needs.changes.outputs.docs_only != 'true'
      - uses: actions/setup-node@v5
        if: needs.changes.outputs.docs_only != 'true'
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
        if: needs.changes.outputs.docs_only != 'true'
      - run: npx turbo run type-check
        if: needs.changes.outputs.docs_only != 'true'
      - run: npx turbo run build
        if: needs.changes.outputs.docs_only != 'true'

  e2e-pure:
    needs: [changes, check]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run test:e2e:pure

  e2e-ui:
    needs: changes
    if: false  # DISABLED — e2e-ui tests need updating for new SENSEI/RAIDEN/MYST UI. Re-enable after test update.
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCUAn7VioaNJAzhtjUQCtd-7byd6ISR_7A
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: claude-mcp-484718.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: claude-mcp-484718
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: claude-mcp-484718.firebasestorage.app
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '365181509090'
      NEXT_PUBLIC_FIREBASE_APP_ID: '1:365181509090:web:08aea23422c813d23b6dbb'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test --project=setup --project=chromium --workers=4 --timeout=60000
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  docker-check:
    needs: [changes, check]
    if: needs.changes.outputs.docs_only != 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Docker build check — API
        run: docker build -t tm-api-check -f services/api/Dockerfile .
      - name: Docker build check — Webhooks
        run: docker build -t tm-webhooks-check -f services/webhooks/Dockerfile services/webhooks

  deploy-api:
    needs: [changes, check]
    if: needs.changes.outputs.docs_only != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: claude-mcp-484718
      REGION: us-central1
      REGISTRY: us-central1-docker.pkg.dev/claude-mcp-484718/tomachina
    steps:
      - uses: actions/checkout@v5
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/365181509090/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@claude-mcp-484718.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v3

      # Authenticate Docker to Artifact Registry
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build + push API image
      - run: |
          docker build -t ${{ env.REGISTRY }}/tm-api:latest -f services/api/Dockerfile .
          docker push ${{ env.REGISTRY }}/tm-api:latest

      # Build + push Webhooks image
      - run: |
          docker build -t ${{ env.REGISTRY }}/tm-webhooks:latest -f services/webhooks/Dockerfile services/webhooks
          docker push ${{ env.REGISTRY }}/tm-webhooks:latest

      # Deploy API to Cloud Run (with liveness probe — auto-restarts on Firestore stale connections)
      # --update-secrets mounts GSM-held keys as env vars. FV-002 NASS integration
      # (2026-04-15) adds NASS_QUICK_STATS_KEY. --update-secrets preserves other
      # secrets previously mounted on tm-api (e.g. CSG_API_KEY) — only the listed
      # key is replaced on each deploy.
      - run: |
          gcloud run deploy tm-api \
            --image ${{ env.REGISTRY }}/tm-api:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 20 \
            --port 8080 \
            --no-allow-unauthenticated \
            --update-secrets NASS_QUICK_STATS_KEY=NASS_QUICK_STATS_KEY:latest \
            --liveness-probe httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,periodSeconds=30,failureThreshold=3,timeoutSeconds=10 \
            --project ${{ env.PROJECT_ID }}



      # Deploy Webhooks to Cloud Run (lightweight — handles Twilio/SendGrid callbacks)
      - run: |
          gcloud run deploy tm-webhooks \
            --image ${{ env.REGISTRY }}/tm-webhooks:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --port 8081 \
            --allow-unauthenticated \
            --liveness-probe httpGet.path=/health,httpGet.port=8081,initialDelaySeconds=10,periodSeconds=30,failureThreshold=3,timeoutSeconds=10 \
            --project ${{ env.PROJECT_ID }}

      # Smoke test — verify API responds after deploy
      - name: Smoke test API health
        run: |
          API_URL=$(gcloud run services describe tm-api --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
          TOKEN=$(gcloud auth print-identity-token --impersonate-service-account=github-deployer@claude-mcp-484718.iam.gserviceaccount.com --audiences="$API_URL" --include-email)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOKEN" "$API_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::API health check failed with status $STATUS"
            curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/health"
            exit 1
          fi
          echo "API health check passed (HTTP $STATUS)"
          curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/health" | jq .

      # Post-deploy: Trigger VOLTRON registry regeneration (TRK-13802)
      - name: Regenerate VOLTRON registry
        run: |
          API_URL=$(gcloud run services describe tm-api --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
          TOKEN=$(gcloud auth print-identity-token --impersonate-service-account=github-deployer@claude-mcp-484718.iam.gserviceaccount.com --audiences="$API_URL" --include-email)
          echo "Triggering VOLTRON registry regeneration..."
          REGEN_STATUS=$(curl -s -o /tmp/regen-response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "x-voltron-ci-token: ${{ secrets.VOLTRON_CI_TOKEN }}" \
            "$API_URL/api/voltron/registry/regenerate")
          if [ "$REGEN_STATUS" != "200" ]; then
            echo "::warning::Registry regeneration returned HTTP $REGEN_STATUS (non-blocking)"
            cat /tmp/regen-response.json
          else
            echo "VOLTRON registry regenerated successfully"
            cat /tmp/regen-response.json | jq .
          fi

  e2e-intake:
    needs: [changes, deploy-api]
    if: needs.changes.outputs.docs_only != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      # Authenticate with GCP for Firestore + Drive access
      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/365181509090/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@claude-mcp-484718.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v3

      # Get Cloud Run API URL for test target
      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe tm-api --region us-central1 --project claude-mcp-484718 --format 'value(status.url)')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      # Run backend E2E pipeline tests
      - name: Run E2E intake tests
        env:
          TEST_API_URL: ${{ steps.api-url.outputs.url }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        run: npm run test:e2e

      # Upload test report on failure
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: e2e-intake-report
          path: tests/e2e/
          retention-days: 14
