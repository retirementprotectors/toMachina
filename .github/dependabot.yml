version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Chicago
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "typescript"
    # TypeScript gets its own PR — major versions have breaking tsconfig changes
    # that need manual review (moduleResolution, process globals, etc.)
    # Block ALL major version bumps — they need manual migration, not auto-merge.
    # Express 4→5 (breaking middleware API), TypeScript 5→6 (breaking tsconfig),
    # @types/node 22→25 (TS compat). These create cascade failures across the pipeline.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
