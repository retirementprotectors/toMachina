version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Chicago
    target-branch: main
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "typescript"
    # TypeScript gets its own PR — major versions have breaking tsconfig changes
    # that need manual review (moduleResolution, process globals, etc.)
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
