# toMachina — Cloud Build Pipeline
# Triggered on push to main branch
# Builds all apps + services, deploys to Cloud Run

steps:
  # Build + push ProDash container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$SHORT_SHA',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:latest',
      '-f', 'apps/prodash/Dockerfile',
      '.'
    ]
    id: 'docker-prodash'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash']
    id: 'push-prodash'
    waitFor: ['docker-prodash']

  # Build + push RIIMO container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-riimo:$SHORT_SHA',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-riimo:latest',
      '-f', 'apps/riimo/Dockerfile',
      '.'
    ]
    id: 'docker-riimo'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-riimo']
    id: 'push-riimo'
    waitFor: ['docker-riimo']

  # Build + push SENTINEL container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-sentinel:$SHORT_SHA',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-sentinel:latest',
      '-f', 'apps/sentinel/Dockerfile',
      '.'
    ]
    id: 'docker-sentinel'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-sentinel']
    id: 'push-sentinel'
    waitFor: ['docker-sentinel']

  # Build + push API container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:$SHORT_SHA',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:latest',
      '-f', 'services/api/Dockerfile',
      '.'
    ]
    id: 'docker-api'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api']
    id: 'push-api'
    waitFor: ['docker-api']

  # Build + push Bridge container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:$SHORT_SHA',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:latest',
      '-f', 'services/bridge/Dockerfile',
      '.'
    ]
    id: 'docker-bridge'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge']
    id: 'push-bridge'
    waitFor: ['docker-bridge']

  # Deploy ProDash to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-prodash',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-prodash'
    waitFor: ['push-prodash']

  # Deploy RIIMO to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-riimo',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-riimo:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-riimo'
    waitFor: ['push-riimo']

  # Deploy SENTINEL to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-sentinel',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-sentinel:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-sentinel'
    waitFor: ['push-sentinel']

  # Deploy API to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-api',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '1Gi',
      '--cpu', '2',
      '--min-instances', '1',
      '--max-instances', '20',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-api'
    waitFor: ['push-api']

  # Deploy Bridge to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-bridge',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '5',
      '--port', '8080',
      '--no-allow-unauthenticated'
    ]
    id: 'deploy-bridge'
    waitFor: ['push-bridge']

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-riimo:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-sentinel:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-api:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-bridge:$SHORT_SHA'

options:
  logging: GCS_ONLY
