# toMachina — ProDash Cloud Build
# Focused build: just ProDash app → Cloud Run
# Usage: gcloud builds submit --config=cloudbuild-prodash.yaml --project=claude-mcp-484718 --region=us-central1

steps:
  # Build ProDash container with Firebase env vars baked in at build time
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$_TAG',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:latest',
      '-f', 'apps/prodash/Dockerfile',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyCUAn7VioaNJAzhtjUQCtd-7byd6ISR_7A',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=claude-mcp-484718.firebaseapp.com',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=claude-mcp-484718',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=claude-mcp-484718.firebasestorage.app',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=365181509090',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_APP_ID=1:365181509090:web:08aea23422c813d23b6dbb',
      '.'
    ]
    id: 'docker-prodash'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$_TAG']
    id: 'push-prodash-tag'
    waitFor: ['docker-prodash']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:latest']
    id: 'push-prodash-latest'
    waitFor: ['docker-prodash']

  # Deploy to Cloud Run with runtime env vars
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'tm-prodash',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$_TAG',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--memory', '512Mi',
      '--cpu', '1',
      '--min-instances', '0',
      '--max-instances', '10',
      '--port', '8080',
      '--allow-unauthenticated',
      '--set-env-vars', 'NODE_ENV=production,NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyCUAn7VioaNJAzhtjUQCtd-7byd6ISR_7A,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=claude-mcp-484718.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=claude-mcp-484718,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=claude-mcp-484718.firebasestorage.app,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=365181509090,NEXT_PUBLIC_FIREBASE_APP_ID=1:365181509090:web:08aea23422c813d23b6dbb'
    ]
    id: 'deploy-prodash'
    waitFor: ['push-prodash-tag']

substitutions:
  _TAG: 'latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tomachina/tm-prodash:$_TAG'

options:
  logging: CLOUD_LOGGING_ONLY
