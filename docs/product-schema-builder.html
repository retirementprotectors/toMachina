function setAction(sk, f, action, btn) {
  if (!S[sk]) S[sk] = {};
  if (!S[sk][f]) S[sk][f] = {action:'keep', merge_to:null};
  
  var row = document.getElementById('row_' + sk + '_' + f);
  row.classList.remove('merged', 'deleted');
  row.querySelectorAll('.ab').forEach(function(b){ b.classList.remove('act'); });

  var mtCell = document.getElementById('mt_' + sk + '_' + f);
  
  if (action === 'keep') {
    S[sk][f] = {action:'keep', merge_to:null};
    mtCell.innerHTML = '';
  } else if (action === 'delete') {
    S[sk][f] = {action:'delete', merge_to:null};
    row.classList.add('deleted');
    mtCell.innerHTML = '';
  } else if (action === 'merge') {

}

  var opts = '<option value="">→ select target</option>';
