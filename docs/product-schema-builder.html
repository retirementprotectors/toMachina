    d.onclick = function() {
      document.querySelectorAll('.st').forEach(function(x){x.classList.remove('a')});
      d.classList.add('a');
      render(sk);
    };
    st.appendChild(d);
  });
  if (first) render(first);
}

function render(sk) {
  var rows = F[sk] || [];
  var el = document.getElementById('content');
  el.innerHTML = '';
  var curSec = '';
  var tbody = null;
  rows.forEach(function(r) {
    if (r.s !== curSec) {
      curSec = r.s;
      var secCount = rows.filter(function(x){return x.s===curSec}).length;
      var sh = document.createElement('div');
      sh.className = 'sh';
      sh.innerHTML = curSec + ' (' + secCount + ')<span>&#9660;</span>';
      sh.onclick = function() {
        var sb = sh.nextElementSibling;
        sb.classList.toggle('col');
        sh.querySelector('span').innerHTML = sb.classList.contains('col') ? '&#9654;' : '&#9660;';
      };
      el.appendChild(sh);
      var sb = document.createElement('div');
      sb.className = 'sb';
      var tbl = document.createElement('table');
      tbl.className = 's';
      tbl.innerHTML = '<tr><th style="width:85px">Action</th><th>Field</th><th>Where</th><th>Count</th><th>Sample</th><th>Merge&rarr;</th></tr>';
      tbody = document.createElement('tbody');
      tbl.appendChild(tbody);
      sb.appendChild(tbl);
      el.appendChild(sb);
    }
    var tr = document.createElement('tr');
    tr.id = 'r_' + sk + '_' + r.f;
    var wc = r.w === 'F+B' ? 'fb' : r.w === 'FE' ? 'fe' : r.w === 'BE' ? 'be' : 'no';
    tr.innerHTML = '<td><div class="acts">' +
      '<button class="ab ka" onclick="act(this,\''+sk+'\',\''+r.f+'\',\'keep\')">&#10003;</button>' +
      '<button class="ab" onclick="act(this,\''+sk+'\',\''+r.f+'\',\'merge\')">&#8594;</button>' +
      '<button class="ab" onclick="act(this,\''+sk+'\',\''+r.f+'\',\'delete\')">&#10005;</button>' +
      '</div></td>' +
      '<td class="fn">' + r.f + '</td>' +
      '<td><span class="wb '+wc+'">' + r.w + '</span></td>' +
      '<td class="ct">' + r.c + '/' + r.t + '</td>' +
      '<td class="sm">' + (r.sm||'') + '</td>' +
      '<td class="mt" id="mt_'+sk+'_'+r.f+'"></td>';
    if (tbody) tbody.appendChild(tr);
  });
}

function act(btn, sk, f, action) {
  if (!S[sk]) S[sk] = {};
  if (!S[sk][f]) S[sk][f] = {action:'keep',merge_to:null};
  var tr = document.getElementById('r_' + sk + '_' + f);
  tr.classList.remove('merged','deleted');
  tr.querySelectorAll('.ab').forEach(function(b){b.classList.remove('ka','ma','da')});
  var mt = document.getElementById('mt_' + sk + '_' + f);
  mt.innerHTML = '';
  if (action === 'keep') {
    btn.classList.add('ka');
    S[sk][f] = {action:'keep',merge_to:null};
  } else if (action === 'delete') {
    btn.classList.add('da');
    tr.classList.add('deleted');
    S[sk][f] = {action:'delete',merge_to:null};
  } else {
    btn.classList.add('ma');
    tr.classList.add('merged');
    S[sk][f] = {action:'merge',merge_to:null};
    var rows = F[sk] || [];
    var r = rows.find(function(x){return x.f===f});
    if (r && r.sf) {
      var sel = document.createElement('select');
      sel.innerHTML = '<option value="">select target</option>';
      r.sf.forEach(function(tf) {
        var o = document.createElement('option');
        o.value = tf; o.textContent = tf;
        sel.appendChild(o);
      });
      sel.onchange = function() { S[sk][f].merge_to = sel.value || null; };
      mt.appendChild(sel);
    }
  }
}

function exp() {
  var blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'product-schema-v4.json';
  a.click();
}

init();
</script>
</body>
