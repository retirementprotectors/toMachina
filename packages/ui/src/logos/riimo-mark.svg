<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="rim-g" x1="4" y1="60" x2="60" y2="4" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a4d35"/>
      <stop offset="1" stop-color="#3da06e"/>
    </linearGradient>
  </defs>

  <!-- Compass ring -->
  <circle cx="32" cy="32" r="26" stroke="url(#rim-g)" stroke-width="2.5" fill="none"/>
  <circle cx="32" cy="32" r="7" fill="url(#rim-g)"/>

  <!-- Cardinal lines -->
  <line x1="32" y1="2" x2="32" y2="14" stroke="url(#rim-g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="62" stroke="url(#rim-g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="32" x2="14" y2="32" stroke="url(#rim-g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="62" y2="32" stroke="url(#rim-g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Diagonal ticks -->
  <line x1="50" y1="14" x2="55" y2="9" stroke="url(#rim-g)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="14" y1="14" x2="9" y2="9" stroke="url(#rim-g)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="50" y1="50" x2="55" y2="55" stroke="url(#rim-g)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="14" y1="50" x2="9" y2="55" stroke="url(#rim-g)" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
</svg>
