<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sm-dark" x1="10" y1="58" x2="54" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#164a30"/>
      <stop offset="1" stop-color="#1e6e42"/>
    </linearGradient>
    <linearGradient id="sm-shield" x1="14" y1="54" x2="50" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22774a"/>
      <stop offset="1" stop-color="#3CB371"/>
    </linearGradient>
    <linearGradient id="sm-r" x1="24" y1="44" x2="40" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7be8a8"/>
      <stop offset="1" stop-color="#a8f0ca"/>
    </linearGradient>
  </defs>

  <!-- ============ LAUREL WREATH ============ -->
  <!-- Left branch -->
  <ellipse cx="19" cy="52" rx="2.8" ry="5.5" transform="rotate(-55, 19, 52)" fill="url(#sm-dark)"/>
  <ellipse cx="13" cy="46" rx="2.8" ry="5.5" transform="rotate(-40, 13, 46)" fill="url(#sm-dark)"/>
  <ellipse cx="9" cy="39" rx="2.8" ry="5.5" transform="rotate(-22, 9, 39)" fill="url(#sm-dark)"/>
  <ellipse cx="7" cy="31" rx="2.8" ry="5.5" transform="rotate(0, 7, 31)" fill="url(#sm-dark)"/>
  <ellipse cx="9" cy="23" rx="2.6" ry="5" transform="rotate(22, 9, 23)" fill="url(#sm-dark)"/>
  <ellipse cx="13" cy="16" rx="2.5" ry="5" transform="rotate(40, 13, 16)" fill="url(#sm-dark)"/>
  <ellipse cx="20" cy="11" rx="2.4" ry="4.5" transform="rotate(58, 20, 11)" fill="url(#sm-dark)"/>
  <ellipse cx="28" cy="8" rx="2.2" ry="4" transform="rotate(72, 28, 8)" fill="url(#sm-dark)"/>

  <!-- Right branch (mirrored) -->
  <ellipse cx="45" cy="52" rx="2.8" ry="5.5" transform="rotate(55, 45, 52)" fill="url(#sm-dark)"/>
  <ellipse cx="51" cy="46" rx="2.8" ry="5.5" transform="rotate(40, 51, 46)" fill="url(#sm-dark)"/>
  <ellipse cx="55" cy="39" rx="2.8" ry="5.5" transform="rotate(22, 55, 39)" fill="url(#sm-dark)"/>
  <ellipse cx="57" cy="31" rx="2.8" ry="5.5" transform="rotate(0, 57, 31)" fill="url(#sm-dark)"/>
  <ellipse cx="55" cy="23" rx="2.6" ry="5" transform="rotate(-22, 55, 23)" fill="url(#sm-dark)"/>
  <ellipse cx="51" cy="16" rx="2.5" ry="5" transform="rotate(-40, 51, 16)" fill="url(#sm-dark)"/>
  <ellipse cx="44" cy="11" rx="2.4" ry="4.5" transform="rotate(-58, 44, 11)" fill="url(#sm-dark)"/>
  <ellipse cx="36" cy="8" rx="2.2" ry="4" transform="rotate(-72, 36, 8)" fill="url(#sm-dark)"/>

  <!-- ============ SHIELD ============ -->
  <path d="M 32 10 L 50 18 L 50 33 C 50 44 42 51 32 55 C 22 51 14 44 14 33 L 14 18 Z"
        fill="url(#sm-shield)" stroke="#5dd895" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- ============ STYLIZED R ============ -->
  <path d="M 24 21 L 24 44 L 28.5 44 L 28.5 35 L 35 44 L 40.5 44 L 33 34.5
           C 36.5 33.5 39 30.8 39 27.5 C 39 23.5 36 21 32 21 Z
           M 28.5 25 L 32 25 C 34 25 35.5 26 35.5 28 C 35.5 30 34 31 32 31 L 28.5 31 Z"
        fill="url(#sm-r)" fill-rule="evenodd"/>
</svg>
